<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="WOODZ 전곡 카탈로그를 태깅하고 오늘의 날씨로 추천해주는 웹앱"
    />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
    <title>WOODZ Weather Recommender</title>
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <p class="eyebrow">WEATHER X WOODZ</p>
        <h1>오늘 날씨에 어울리는 WOODZ 플레이리스트</h1>
        <p class="hero-copy">
          WOODZ의 솔로 곡 카탈로그를 릴리즈별로 정리하고, 분위기와 날씨 태그를 입혀서
          지금 날씨에 가장 잘 맞는 곡을 추천합니다.
        </p>
        <div class="hero-actions">
          <button id="use-location" class="primary-button">내 위치로 날씨 가져오기</button>
          <form id="city-form" class="city-form">
            <input
              id="city-input"
              name="city"
              type="text"
              placeholder="도시 입력 예: Seoul, Tokyo, Paris"
              autocomplete="off"
            />
            <button type="submit" class="ghost-button">도시 검색</button>
          </form>
        </div>
      </header>

      <main class="layout">
        <section class="panel weather-panel">
          <div class="panel-heading">
            <div>
              <p class="panel-label">Step 1</p>
              <h2>지금 위치와 날씨</h2>
            </div>
            <span id="weather-status" class="status-pill">초기화 중</span>
          </div>
          <div id="weather-summary" class="weather-summary"></div>
          <div id="weather-tags" class="chip-row"></div>
        </section>

        <section class="panel filter-panel">
          <div class="panel-heading">
            <div>
              <p class="panel-label">Step 2</p>
              <h2>오늘의 무드</h2>
            </div>
          </div>
          <p class="section-copy">지금 감정에 가장 가까운 무드를 하나 골라주세요.</p>
          <div class="mood-picker">
            <button class="mood-button" data-mood="calm" type="button">🙂 calm</button>
            <button class="mood-button" data-mood="sad" type="button">😔 sad</button>
            <button class="mood-button" data-mood="excited" type="button">🔥 excited</button>
            <button class="mood-button" data-mood="nostalgic" type="button">💭 nostalgic</button>
            <button class="mood-button" data-mood="lonely" type="button">🌙 lonely</button>
          </div>
        </section>

        <section class="panel recommendation-panel">
          <div class="panel-heading">
            <div>
              <p class="panel-label">Step 3</p>
              <h2>추천된 WOODZ 노래</h2>
            </div>
            <span id="recommendation-count" class="status-pill">최대 5곡</span>
          </div>
          <div id="recommendation-insight" class="insight-box"></div>
          <div id="recommendations" class="recommendation-list"></div>
        </section>
      </main>
    </div>

    <script src="./config.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
